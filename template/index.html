<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>MarkEye — 标记视觉检测</title>
  <link rel="icon" type="image/svg+xml" href="../icon/logo/markeye.svg" />
  <link rel="stylesheet" href="css/variables.css" />
  <link rel="stylesheet" href="css/layout.css" />
  <link rel="stylesheet" href="css/components.css" />
  <link rel="stylesheet" href="css/theme-industrial.css" />
</head>
<body>
  <div id="connection-banner" role="alert" aria-live="polite"></div>

  <div id="app" class="app-root">
    <!-- ── Header ── -->
    <header id="region-header">
      <nav id="region-menu" aria-label="主菜单">
        <span class="menu-item">文件(<kbd>F</kbd>)</span>
        <span class="menu-item">显示(<kbd>V</kbd>)</span>
        <span class="menu-item">传感器(<kbd>S</kbd>)</span>
        <span class="menu-item">图像(<kbd>I</kbd>)</span>
        <span class="menu-item">设定(<kbd>S</kbd>)</span>
        <span class="menu-item">窗口(<kbd>W</kbd>)</span>
        <span class="menu-item">帮助(<kbd>H</kbd>)</span>
      </nav>

      <div id="region-mode">
        <div class="mode-tabs">
          <button type="button" class="mode-tab is-active" data-mode="run" aria-pressed="true">
            <img src="../icon/mode/run-active.svg" alt="" />
            运行中
          </button>
          <button type="button" class="mode-tab" data-mode="settings" aria-pressed="false">
            <img src="../icon/mode/settings-inactive.svg" alt="" />
            设定
          </button>
        </div>
        <div class="mode-profile">
          <select id="config-profile" class="select-profile" aria-label="配置方案">
            <option value="config.yaml">P001: config.yaml — 默认方案</option>
            <option value="config.local.yaml">P002: config.local.yaml — 产线方案</option>
          </select>
          <button type="button" id="btn-details" class="btn btn-secondary">详细</button>
        </div>
      </div>

      <div id="region-summary">
        <div id="verdict-badge" class="state-idle" aria-live="polite">—</div>
        <div class="summary-status">
          <span id="learn-count">已学习: —</span>
          <span id="trigger-mode">—</span>
          <span id="process-time">处理: —</span>
        </div>
        <div class="summary-actions">
          <button type="button" id="btn-learn-add" class="btn btn-primary">
            <img src="../icon/action/learn-add.svg" alt="" />
            追加学习
          </button>
          <button type="button" id="btn-threshold" class="btn btn-secondary">
            <img src="../icon/action/threshold.svg" alt="" />
            调节阈值
          </button>
        </div>
      </div>
    </header>

    <!-- ── Main ── -->
    <main id="region-main" class="main-body">
      <section id="region-image" aria-label="图像显示">
        <div id="image-toolbar">
          <button type="button" id="btn-zoom-in" class="btn btn-icon" title="放大">
            <img src="../icon/toolbar/zoom-in.svg" alt="放大" />
          </button>
          <button type="button" id="btn-zoom-out" class="btn btn-icon" title="缩小">
            <img src="../icon/toolbar/zoom-out.svg" alt="缩小" />
          </button>
          <span id="zoom-label">100%</span>
          <span class="toolbar-sep"></span>
          <button type="button" id="btn-fit" class="btn btn-icon" title="适应屏幕">
            <img src="../icon/toolbar/fit-screen.svg" alt="适应" />
          </button>
          <button type="button" class="btn btn-icon" title="处理视图">
            <img src="../icon/toolbar/process.svg" alt="处理" />
          </button>
          <button type="button" id="btn-toggle-labels" class="btn btn-icon" title="标注文字">
            <img src="../icon/toolbar/text-tool.svg" alt="文字" />
          </button>
        </div>

        <div id="image-viewport-wrap" class="image-viewport-wrap">
          <div id="image-viewport" class="image-viewport">
            <canvas id="frame-canvas" aria-label="检测图像"></canvas>
            <svg id="overlay-svg" class="overlay-layer" aria-hidden="true"></svg>
            <div id="tool-label" class="floating-label" hidden>Tool 03: —</div>
          </div>
        </div>

        <div id="settings-panel" aria-label="参数设定"></div>
      </section>

      <aside id="region-tools" aria-label="检查项">
        <div id="tool-list" class="tool-list"></div>
        <div id="tool-detail"></div>
      </aside>
    </main>

    <!-- ── Footer ── -->
    <footer id="region-footer">
      <div id="region-stats">
        <div class="stats-table">
          <span>处理时间: <strong id="stat-process">—</strong> ms</span>
          <span>Max: <strong id="stat-max">—</strong> ms</span>
          <span>Min: <strong id="stat-min">—</strong> ms</span>
          <span>Ave: <strong id="stat-ave">—</strong> ms</span>
        </div>
        <div class="stats-actions">
          <button type="button" id="btn-switch" class="btn btn-secondary">
            <img src="../icon/action/switch.svg" alt="" />
            切换
          </button>
          <button type="button" id="btn-reset" class="btn btn-secondary btn-danger">
            <img src="../icon/action/reset.svg" alt="" />
            复位
          </button>
        </div>
      </div>

      <nav id="region-nav" aria-label="底部导航">
        <div class="nav-group">
          <button type="button" class="btn btn-nav">
            <img src="../icon/nav/menu.svg" alt="" />
            菜单
          </button>
          <button type="button" id="btn-disconnect" class="btn btn-nav">
            <img src="../icon/nav/disconnect.svg" alt="" />
            切换/断开
          </button>
        </div>
        <div class="nav-group">
          <button type="button" class="btn btn-nav">
            <img src="../icon/nav/statistics.svg" alt="" />
            统计
          </button>
          <button type="button" class="btn btn-nav">
            <img src="../icon/nav/switch-screen.svg" alt="" />
            切换画面
          </button>
        </div>
      </nav>
    </footer>
  </div>

  <!-- 确认弹窗 -->
  <div id="modal-overlay" class="modal-overlay" role="dialog" aria-modal="true" aria-labelledby="modal-title">
    <div class="modal">
      <div id="modal-title" class="modal__title">确认</div>
      <p id="modal-message"></p>
      <div class="modal__actions">
        <button type="button" id="modal-cancel" class="btn btn-secondary">取消</button>
        <button type="button" id="modal-ok" class="btn btn-primary">确定</button>
      </div>
    </div>
  </div>

  <script type="module" src="js/app.js"></script>
</body>
</html>
